<mat-dialog-content class="mat-typography">
    <form [formGroup]="form" >
        <div class="flex-row">
                <mat-form-field class="flex-col-lg">
                    <mat-label>Start Date Range</mat-label>
                    <input matInput [matDatepicker]="startDatePicker"  formControlName="startDate" id="start-date-input"/>
                    <mat-datepicker-toggle matIconSuffix [for]="startDatePicker" id="start-date-toggle"></mat-datepicker-toggle>
                    <mat-datepicker #startDatePicker>
                        <mat-datepicker-actions>
                            <button mat-button matDatepickerCancel id="date-cancel-btn">Cancel</button>
                            <button mat-raised-button matDatepickerApply id="date-apply-btn">Apply</button>
                        </mat-datepicker-actions>
                    </mat-datepicker>
                </mat-form-field>
                <mat-form-field class="flex-col">
                    <mat-label>Pick a time</mat-label>
                    <input matInput [matTimepicker]="startTimepicker" formControlName="startTime" id="start-time-input">
                    <mat-timepicker-toggle matIconSuffix [for]="startTimepicker" id="start-time-toggle"/>
                    <mat-timepicker #startTimepicker/>
                </mat-form-field>
        </div>
        <div class="flex-row">
                <mat-form-field class="flex-col-lg">
                    <mat-label>End Date Range</mat-label>
                    <input matInput [matDatepicker]="endDatePicker" formControlName="endDate" />
                    <mat-datepicker-toggle matIconSuffix [for]="endDatePicker"></mat-datepicker-toggle>
                    <mat-datepicker #endDatePicker></mat-datepicker>
                </mat-form-field>
                <mat-form-field class="flex-col">
                    <mat-label>Pick a time</mat-label>
                    <input matInput [matTimepicker]="endTimepicker"  formControlName="endTime">
                    <mat-timepicker-toggle matIconSuffix [for]="endTimepicker"/>
                    <mat-timepicker #endTimepicker/>
                </mat-form-field>
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button  mat-raised-button color="info" (click)="onSubmit()">
        <mat-icon>
            start
        </mat-icon>
        Select
    </button>
</mat-dialog-actions>
