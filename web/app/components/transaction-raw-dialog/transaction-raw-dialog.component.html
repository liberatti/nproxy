<h2 mat-dialog-title>Transaction Content</h2>
<mat-dialog-content class="mat-typography">
  <pre>{{data|json}}</pre>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-raised-button color="primary" (click)="onDismiss()">
    <mat-icon>
      exit_to_app
    </mat-icon>Close
  </button>
</mat-dialog-actions>
