<h1 mat-dialog-title>
    Rule
</h1>

<div mat-dialog-content>
    <form [formGroup]="form">
        <div class="mat-row">
            <div class="mat-col-12">
                <mat-form-field class="full-width">
                    <mat-label>Field</mat-label>
                    <mat-select formControlName="field">
                        <mat-option *ngFor="let ut of _fields" [value]="ut"
                                    style="text-transform: capitalize">
                            {{ ut }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
            
        </div>
        <div class="mat-row">
            <div class="mat-col-12">
                <mat-form-field class="full-width">
                    <mat-label>Regex</mat-label>
                    <textarea matInput
                              formControlName="regex"></textarea>
                </mat-form-field>
            </div>
        </div>
    </form>
</div>
<div mat-dialog-actions align="end">
    <button type="button" (click)="onSubmit()" mat-raised-button color="primary">
        <mat-icon>save</mat-icon>
        Confirm
    </button>
    <button type="button" mat-mini-fab color="primary" (click)="onCancel()">
        <mat-icon>keyboard_return</mat-icon>
    </button>
</div>
