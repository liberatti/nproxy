<ng-container>
    <mat-card>
        <mat-card-header>
            <mat-card-title>{{ 'view.feed.title'|translate }}</mat-card-title>
            <mat-card-subtitle>{{ (isAddMode ? 'actions.create' : 'actions.edit')| translate }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
            <div class="row">
                <div class="col">
                    <form [formGroup]="form">
                        <div class="mat-row">
                            <div class="mat-col-9">
                                <mat-form-field class="full-width">
                                    <mat-label>Name</mat-label>
                                    <input matInput formControlName="name" [readonly]="!isAddMode">
                                </mat-form-field>
                            </div>
                            <div class="mat-col-3">
                                <mat-form-field class="full-width">
                                    <mat-label>Type</mat-label>
                                    @if (isAddMode) {
                                        <mat-select id="type" formControlName="type">
                                            <mat-option id="p-{{i}}" *ngFor="let ut of _supportedTypes;  let i = index"
                                                        [value]="ut">
                                                {{ ut }}
                                            </mat-option>
                                        </mat-select>
                                    } @else {
                                        <input matInput readonly [value]="form.get('type')?.value">
                                    }
                                </mat-form-field>
                            </div>
                        </div>
                        <div class="mat-row">
                            <div class="mat-col-12">
                                <mat-form-field class="full-width">
                                    <mat-label>Description</mat-label>
                                    <textarea matInput formControlName="description"></textarea>
                                </mat-form-field>
                            </div>
                        </div>
                        <div class="mat-row">
                            <div class="mat-col-12">
                                <mat-form-field class="full-width">
                                    <mat-label>provider</mat-label>
                                    <input matInput formControlName="provider" [readonly]="!isAddMode">
                                </mat-form-field>
                            </div>
                        </div>
                        <div class="mat-row">
                            <div class="mat-col-12">
                                <mat-form-field class="full-width">
                                    <mat-label>source</mat-label>
                                    <input matInput formControlName="source">
                                </mat-form-field>
                            </div>
                        </div>
                        <div class="mat-row">
                            <div class="mat-col-12">
                                <mat-form-field class="full-width">
                                    <mat-label>update_interval</mat-label>
                                    <input matInput formControlName="update_interval">
                                </mat-form-field>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </mat-card-content>
        <mat-card-actions align="end">
            <button type="button" mat-raised-button color="primary"
                    *ngIf="form.enabled" (click)="onSubmit()">
                <mat-icon>save</mat-icon>
                {{ 'actions.save'|translate }}
            </button>
            <button mat-mini-fab [routerLink]="['/feed']">
                <mat-icon>keyboard_return</mat-icon>
            </button>
        </mat-card-actions>
    </mat-card>
</ng-container>
