<ng-container>
    <mat-card>
        <mat-card-header>
            <mat-card-title>{{ 'view.jail.title'|translate }}</mat-card-title>
            <mat-card-subtitle>{{ (isAddMode ? 'actions.create' : 'actions.edit')| translate }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
            <div class="row">
                <div class="col">
                    <form [formGroup]="form">
                        <div class="mat-row">
                            <div class="mat-col-8">
                                <mat-form-field class="full-width">
                                    <mat-label>Name</mat-label>
                                    <input id="jail.name" matInput formControlName="name" [readonly]="!isAddMode">
                                </mat-form-field>
                            </div>
                            <div class="mat-col-4">
                                <mat-form-field class="full-width">
                                    <mat-label>Type</mat-label>
                                    <mat-select formControlName="type">
                                        <mat-option *ngFor="let ut of _types" [value]="ut"
                                                    style="text-transform: capitalize">
                                            {{ ut }}
                                        </mat-option>
                                    </mat-select>
                                </mat-form-field>
                            </div>
                        </div>
                        <mat-form-field class="full-width">
                            <mat-label>Bantime</mat-label>
                            <input id="jail.bantime" matInput formControlName="bantime">
                        </mat-form-field>
                        <div *ngIf="form.value.type == 'dynamic'">
                            <div class="mat-row">
                                <div class="mat-col-6">
                                    <mat-form-field class="full-width">
                                        <mat-label>Occurrence</mat-label>
                                        <input matInput type="number" formControlName="occurrence">
                                    </mat-form-field>
                                </div>
                                <div class="mat-col-6">
                                    <mat-form-field class="full-width">
                                        <mat-label>Interval</mat-label>
                                        <input matInput type="number" formControlName="interval">
                                    </mat-form-field>
                                </div>
                            </div>
                            <mat-card>
                                <mat-card-header>
                                    <mat-card-subtitle>Rules</mat-card-subtitle>
                                    <div style="flex: auto">
                                        <button style="float: right" mat-icon-button color="primary"
                                                (click)="onAddRule()" *ngIf="form.enabled">
                                            <mat-icon>add</mat-icon>
                                        </button>
                                    </div>
                                </mat-card-header>
                                <mat-card-content>
                                    <table mat-table [dataSource]="ruleDS">
                                        <tr mat-header-row *matHeaderRowDef="ruleDC"></tr>
                                        <tr mat-row *matRowDef="let row; columns: ruleDC;"></tr>

                                        <ng-container matColumnDef="field">
                                            <th mat-header-cell *matHeaderCellDef> Field</th>
                                            <td mat-cell *matCellDef="let element">
                                                {{ element.field }}
                                            </td>
                                        </ng-container>
                                        <ng-container matColumnDef="regex">
                                            <th mat-header-cell *matHeaderCellDef> Regex</th>
                                            <td mat-cell *matCellDef="let element">
                                                {{ element.regex }}
                                            </td>
                                        </ng-container>

                                        <ng-container matColumnDef="action">
                                            <th mat-header-cell *matHeaderCellDef></th>
                                            <td mat-cell *matCellDef="let element;let i = index;">
                                                <div class="table-cell-actions">
                                                    <button mat-button type="button" [matMenuTriggerFor]="menu"
                                                            *ngIf="form.enabled">
                                                        <mat-icon>more_vert</mat-icon>
                                                    </button>
                                                    <mat-menu #menu="matMenu" xPosition="before"
                                                              [overlapTrigger]="true">
                                                        <button mat-menu-item type="button" (click)="onEditRule(i)">
                                                            <mat-icon>edit</mat-icon>
                                                            Edit
                                                        </button>
                                                        <button mat-menu-item type="button"
                                                                (click)="onRuleRemove(i)">
                                                            <mat-icon>delete</mat-icon>
                                                            Delete
                                                        </button>
                                                    </mat-menu>
                                                </div>
                                            </td>
                                        </ng-container>
                                    </table>

                                </mat-card-content>
                            </mat-card>
                        </div>
                        <form [formGroup]="contentForm" *ngIf="form.value.type == 'static'">
                            <mat-card>
                                <mat-form-field class="w-100">
                                    <mat-label>Network Address</mat-label>
                                    <input matInput formControlName="text">
                                    <button color="primary" matSuffix mat-icon-button (click)="onAddContent()">
                                        <mat-icon>add</mat-icon>
                                    </button>
                                </mat-form-field>
                                <mat-card-content>
                                    <mat-chip-listbox>
                                        <mat-chip-row *ngFor="let p of form.value.content"
                                                      (removed)="onRemoveContent(p)">
                                            <p matTooltip="{{p.banned_on |dateFormat}}">
                                                {{ p.ipaddr }}
                                            </p>
                                            <button matChipRemove>
                                                <mat-icon>cancel</mat-icon>
                                            </button>
                                        </mat-chip-row>
                                    </mat-chip-listbox>
                                </mat-card-content>
                            </mat-card>
                        </form>
                    </form>
                </div>
            </div>
        </mat-card-content>
        <mat-card-actions align="end">
            <button id="btn-save" type="button" mat-raised-button color="primary"
                    *ngIf="form.enabled" (click)="onSubmit()">
                <mat-icon>save</mat-icon>
                {{ 'actions.save'|translate }}
            </button>
            <button mat-mini-fab [routerLink]="['/jail']">
                <mat-icon>keyboard_return</mat-icon>
            </button>
        </mat-card-actions>
    </mat-card>
</ng-container>
