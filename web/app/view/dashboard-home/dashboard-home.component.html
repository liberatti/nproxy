<div class="container">
    <div class="nodes-section">
        <h2>Nodes</h2>
        <div *ngFor="let n of nodeList" class="node-item">
            <div class="node-header">
                <small> <b>{{ n.name }}</b>
                    <mat-chip>
                        {{ n.role }}
                    </mat-chip>
                </small>
                <div class="status-actions">
                    <button *ngIf="!n.healthy" mat-flat-button color="warn" (click)="show_details(n)"
                            class="warn-button">
                        <mat-icon>warning_amber</mat-icon>
                        Details
                    </button>
                </div>
            </div>
            <div class="node-details">
                <div class="status">
                    <mat-icon>monitor_heart</mat-icon>
                    {{ n.last_check | dateFormat }}
                </div>
                <div class="version">
                    <mat-icon>system_update_alt</mat-icon>
                    <small>{{ n.version }}</small>
                </div>
                <div class="synchronization">
                    <b>Synchronization:</b> {{ n.scn }}
                    <mat-icon>cloud_download</mat-icon>
                    {{ n.net_recv |byteFormat }}/s
                    <mat-icon>cloud_upload</mat-icon>
                    {{ n.net_send|byteFormat }}/s
                </div>
            </div>
        </div>
    </div>
</div>
