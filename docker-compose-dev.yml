services:
  # /etc/sysctl.conf
  # vm.max_map_count=262144
  elastic:
    image: elasticsearch:8.16.1
    environment:
      - "ES_JAVA_OPTS=-Xmx1g -Xms512m"
      - "discovery.type=single-node"
      - "ELASTIC_PASSWORD=elastic"
      - "xpack.security.enabled=false"
      - "xpack.watcher.enabled=false"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 2G
  kibana:
    image: elastic/kibana:8.16.1
    environment:
      - "ELASTICSEARCH_URL=http://elastic:9200"
      #- "ELASTICSEARCH_USERNAME=elastic"
      #- "ELASTICSEARCH_PASSWORD=elastic"
      - "XPACK_GRAPH_ENABLED=false"
      - "XPACK_ML_ENABLED=false"
      - "XPACK_REPORTING_ENABLED=false"
      - "XPACK_SECURITY_ENABLED=false"
      - "XPACK_WATCHER_ENABLED=false"
    ports:
      - "5601:5601"

  mongo:
    image: mongodb/mongodb-community-server:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: nproxy_usr
      MONGO_INITDB_ROOT_PASSWORD: nproxy_psw
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  proxy:
    depends_on:
      - mongo
    image: liberatti/nproxy:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: nproxy
      MONGO_USER: nproxy_usr
      MONGO_PASS: nproxy_psw
      NODE_ROLE: "main"
      SERVERID: "dev-node"
    entrypoint: [ "gunicorn","-k","eventlet","-w","1","main:app","-b","0.0.0.0:5000" ]
    init: true
    ports:
      - "5000:5000"
      - "80:80"
      - "443:443"
    volumes:
      - .:/opt/nproxy/admin
      - ./lualib:/opt/nproxy/lualib/share/lua/5.4/nproxy
    deploy:
      resources:
        limits:
          memory: 256M
  proxy-worker-01:
    image: liberatti/nproxy:latest
    environment:
      MONGO_URI: mongodb://mongo
      NODE_ROLE: "replica"
      SERVERID: "dev-node-worker-01"
      CLUSTER_ENDPOINT: http://proxy:5000
    init: true
    ports:
      - "5001:5000"
      - "81:80"
    volumes:
      - .:/opt/nproxy/admin
    deploy:
      resources:
        limits:
          memory: 256M
  php-fpm:
    image: local/php-fpm:latest
    build:
      context: test/php-fpm
      dockerfile: Dockerfile
    ports:
      - "8006:9000"
    volumes:
      - ./test/php-fpm:/app
  export:
    image: liberatti/nproxy:export
    build:
      context: .
      dockerfile: Dockerfile
      target: engine
    entrypoint: [ '/bin/bash','-c' ]
    command: [ 'cp /root/rpmbuild/RPMS/*/*.rpm /target' ]
    volumes:
      - ./target:/target
volumes:
  mongo-data:
    driver: local
  elastic-data:
    driver: local